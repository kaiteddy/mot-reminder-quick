<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; width: 300px; padding: 15px; background: #0f172a; color: white; margin: 0; }
    h2 { font-size: 16px; margin-top: 0; margin-bottom: 5px; color: #e2e8f0; display: flex; align-items: center; gap: 8px;}
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; background-color: #ef4444; }
    .dot.connected { background-color: #22c55e; box-shadow: 0 0 8px #22c55e;}
    .status { font-size: 12px; color: #94a3b8; margin-bottom: 15px; }
    .card { background: #1e293b; padding: 12px; border-radius: 8px; font-size: 12px; border: 1px solid #334155; }
    .footer { margin-top: 15px; font-size: 11px; color: #64748b; text-align: center;}
    .code { font-family: monospace; color: #38bdf8; word-break: break-all; margin-top: 5px; font-size: 10px; }
  </style>
</head>
<body>
  <h2><span id="statusDot" class="dot"></span> Autodata Harvester</h2>
  <div class="status" id="statusText">Waiting for token sync...</div>
  
  <div class="card">
    <strong style="color: #cbd5e1;">Last Synced Token:</strong><br>
    <div class="code" id="tokenText">None detected. Log into Euro Car Parts network (omnipart.eurocarparts.com) to capture automatically.</div>
    <div style="margin-top: 12px; color: #94a3b8; font-size: 10px;">
        <strong>SYNC TIME:</strong> <span id="timeText" style="color: #cbd5e1;">Never</span>
    </div>
  </div>
  
  <div class="footer">
    This extension runs silently in the background. Simply keep a tab open and logged in to Euro Car Parts. 
  </div>

  <script src="popup.js"></script>
</body>
</html>
